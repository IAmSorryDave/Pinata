name: Validate Test Definition

on:
  push:
    branches:
      - 'test/**'
  pull_request:
    branches:
      - 'test/**'

jobs:
  validate-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v7
      
      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      
      - name: Validate BATS syntax
        run: |
          for test_file in tests/*.bats; do
            echo "Checking syntax: $test_file"
            bats --parse-only "$test_file" || exit 1
          done
      
      - name: List defined test cases
        run: |
          echo "## Test Cases Defined" >> $GITHUB_STEP_SUMMARY
          grep -h "^@test" tests/*.bats | sed 's/@test "/- /' | sed 's/" {//' >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR with test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            // Extract test names
            const tests = execSync('grep -h "^@test" tests/*.bats || echo ""')
              .toString()
              .trim()
              .split('\n')
              .filter(line => line)
              .map(line => line.replace(/@test "/, '').replace(/" {/, ''));
            
            const body = `## 📝 Test Cases Defined\n\n${tests.map(t => `- ${t}`).join('\n')}\n\n**Ready for implementation!** Use this as the base for an \`implement/test-${context.issue.number}\` branch.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
